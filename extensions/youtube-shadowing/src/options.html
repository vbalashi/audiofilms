<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AudioFilms Settings</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        box-sizing: border-box;
        max-width: 720px;
        padding: 32px;
      }

      h1 {
        font-size: 22px;
        line-height: 1.2;
        margin: 0 0 20px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin: 0 0 8px;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        min-height: 40px;
        border: 1px solid color-mix(in srgb, CanvasText 30%, transparent);
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        min-height: 36px;
        border: 1px solid color-mix(in srgb, CanvasText 30%, transparent);
        border-radius: 6px;
        padding: 0 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: #1677ff;
        border-color: #1677ff;
        color: white;
      }

      p {
        color: color-mix(in srgb, CanvasText 70%, transparent);
        font-size: 13px;
        line-height: 1.45;
        margin: 12px 0 0;
      }

      .status {
        min-height: 20px;
        margin-top: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AudioFilms Settings</h1>
      <label for="asrTesterToken">ASR tester token</label>
      <input id="asrTesterToken" type="password" autocomplete="off" spellcheck="false">
      <div class="actions">
        <button class="primary" id="saveToken" type="button">Save</button>
        <button id="clearToken" type="button">Clear</button>
      </div>
      <p>
        This token is stored in extension storage and is used only for
        AudioFilms ASR timing jobs.
      </p>
      <div hidden>
        <select id="devDictionaryMock">
          <option value="">Dictionary live</option>
          <option value="cards">Dictionary cards mock</option>
          <option value="generated">Dictionary generated mock</option>
        </select>
        <select id="devIssueReportMock">
          <option value="">Issue reports live</option>
          <option value="success">Issue report success mock</option>
          <option value="failure">Issue report failure mock</option>
          <option value="error">Issue report error mock</option>
        </select>
        <button id="saveDevMocks" type="button">Save dev mocks</button>
      </div>
      <p class="status" id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
